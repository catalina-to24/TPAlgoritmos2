        options: ["Solo una Pila", "Un TAD del dominio Cliente que internamente usa una Lista de Compra (otro TAD del dominio)", "Solo un String largo", "Un array de int"],
        correct: 1,
        explanation: "Los TDAs se combinan: Cliente (dominio) contiene una Lista (general) de Compra (dominio). Saber combinar TDAs es el objetivo del parcial." },
    ]
  }
];

// ---------- Quiz logic ----------
const STORAGE_KEY = 'tpa2_quiz_progress_v1';
const root = document.getElementById('quiz-root');
let state = {}; // { gIdx: { answered, correct, picked } }
let runtimeData = []; // clones with shuffled options

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildRuntime(){
  runtimeData = [];
  let gIdx = 0;
  for (const unit of QUIZ_DATA) {
    const questions = [];
    for (const q of unit.questions) {
      const correctText = q.options[q.correct];
      const shuffled = shuffle(q.options);
      const newCorrect = shuffled.indexOf(correctText);
      questions.push({
        gIdx: gIdx++,
        q: q.q,
        options: shuffled,
        correct: newCorrect,
        explanation: q.explanation
      });
    }
    runtimeData.push({ unit: unit.unit, questions });
  }
}

function totalQuestions(){
  return runtimeData.reduce((acc, u) => acc + u.questions.length, 0);
}

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch (e) { state = {}; }
}

function saveState(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function render(){
  root.innerHTML = '';
  const letters = ['A','B','C','D','E','F'];

  runtimeData.forEach((unit, uIdx) => {
    const section = document.createElement('section');
    section.className = 'unit-section';

    const answered = unit.questions.filter(q => state[q.gIdx] && state[q.gIdx].answered).length;
    const correct = unit.questions.filter(q => state[q.gIdx] && state[q.gIdx].correct).length;

    const header = document.createElement('div');
    header.className = 'unit-section-title';
    header.innerHTML = `
      <span class="label"><span>${unit.unit}</span></span>
      <span class="counter">${correct}/${answered} · ${unit.questions.length} preguntas</span>
      <span class="toggle-icon">▼</span>
    `;
    header.addEventListener('click', () => section.classList.toggle('collapsed'));
    section.appendChild(header);

    const list = document.createElement('div');
    list.className = 'question-list';

    unit.questions.forEach((q, qIdx) => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = 'q-' + q.gIdx;
      card.innerHTML = `
        <div class="q-number">Pregunta ${q.gIdx + 1}</div>
        <div class="q-text">${q.q}</div>
        <div class="options"></div>
        <div class="feedback"></div>
        <div class="explanation"><strong>Explicación:</strong> ${q.explanation}</div>
      `;
      const optsDiv = card.querySelector('.options');
      q.options.forEach((opt, oIdx) => {
        const o = document.createElement('div');
        o.className = 'option';
        o.innerHTML = `<span class="option-letter">${letters[oIdx]}</span><span class="option-text">${opt}</span>`;
        o.addEventListener('click', () => pick(q.gIdx, uIdx, qIdx, oIdx));
        optsDiv.appendChild(o);
      });

      list.appendChild(card);
    });

    section.appendChild(list);
    root.appendChild(section);
  });

  // Re-apply state to UI
  runtimeData.forEach(unit => {
    unit.questions.forEach(q => {
      if (state[q.gIdx] && state[q.gIdx].answered) {
        applyAnswered(q);
      }
    });
  });

  updateScore();
}

function pick(gIdx, uIdx, qIdx, oIdx){
  if (state[gIdx] && state[gIdx].answered) return;
  const q = runtimeData[uIdx].questions[qIdx];
  const isCorrect = oIdx === q.correct;
  state[gIdx] = { answered: true, correct: isCorrect, picked: oIdx };
  saveState();
  applyAnswered(q, oIdx);
  updateScore();
  updateUnitCounters();
}

function applyAnswered(q, pickedIdx){
  const card = document.getElementById('q-' + q.gIdx);
  if (!card) return;
  const picked = pickedIdx !== undefined ? pickedIdx : (state[q.gIdx] && state[q.gIdx].picked);
  const options = card.querySelectorAll('.option');
  options.forEach((o, i) => {
    o.classList.add('disabled');
    if (i === q.correct) o.classList.add('correct-answer');
    else if (i === picked) o.classList.add('wrong-answer');
  });
  const isCorrect = picked === q.correct;
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  const fb = card.querySelector('.feedback');
  fb.textContent = isCorrect ? '✓ ¡Correcto!' : '✗ Incorrecto';
  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  card.querySelector('.explanation').classList.add('show');
}

function updateScore(){
  const total = totalQuestions();
  let correct = 0, wrong = 0;
  for (const key in state) {
    if (state[key].answered) {
      if (state[key].correct) correct++;
      else wrong++;
    }
  }
  const pending = total - correct - wrong;
  document.getElementById('score-correct').textContent = correct;
  document.getElementById('score-wrong').textContent = wrong;
  document.getElementById('score-pending').textContent = pending;
  document.getElementById('score-total').textContent = total;
}

function updateUnitCounters(){
  // Rebuild unit counters without full render
  document.querySelectorAll('.unit-section').forEach((sec, uIdx) => {
    const unit = runtimeData[uIdx];
    const answered = unit.questions.filter(q => state[q.gIdx] && state[q.gIdx].answered).length;
    const correct = unit.questions.filter(q => state[q.gIdx] && state[q.gIdx].correct).length;
    sec.querySelector('.counter').textContent = `${correct}/${answered} · ${unit.questions.length} preguntas`;
  });
}

function revealAll(){
  runtimeData.forEach(unit => {
    unit.questions.forEach(q => {
      if (!state[q.gIdx] || !state[q.gIdx].answered) {
        state[q.gIdx] = { answered: true, correct: true, picked: q.correct };
      }
    });
  });
  saveState();
  render();
}

function resetAll(){
  if (!confirm('¿Seguro que querés reiniciar todo el quiz? Se borrará tu progreso.')) return;
  state = {};
  localStorage.removeItem(STORAGE_KEY);
  buildRuntime();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('btn-reveal').addEventListener('click', revealAll);
document.getElementById('btn-reset').addEventListener('click', resetAll);

buildRuntime();
loadState();
render();
</script>
